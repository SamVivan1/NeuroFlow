services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: neuroflow-frontend
    # Blok 'ports' dihapus karena menggunakan network_mode: host
    environment:
      - NODE_ENV=production
      - NODE_OPTIONS=--max-old-space-size=256
      - PORT=3004 # PENTING: Memaksa aplikasi internal berjalan di port 3004 agar tidak bentrok di host
    restart: unless-stopped
    network_mode: host # Kembali menggunakan mode host kesukaan Anda
    
    # Memory and CPU limits for 512MB constraint
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    
    # Health check disesuaikan ke port 3004
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3004"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"