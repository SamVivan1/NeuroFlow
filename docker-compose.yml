services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: neuroflow-frontend
    ports:
      - "3004:3000" # Sekarang ini akan berfungsi dengan benar
    environment:
      - NODE_ENV=production
      - NODE_OPTIONS=--max-old-space-size=256
    restart: unless-stopped
    
    # HAPUS ATAU KOMENTARI BARIS INI:
    # network_mode: host
    
    # Memory and CPU limits for 512MB constraint
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    
    # Health check (Tetap di port 3000 karena di dalam kontainer aplikasinya memakai port 3000)
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"