services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: neuroflow-frontend
    ports:
      - "3004:3000"
    environment:
      - NODE_ENV=production
      - NODE_OPTIONS=--max-old-space-size=256
    restart: unless-stopped
    networks:
      - neuroflow_net # Hubungkan servis ke jaringan kustom di bawah
    
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# Definisikan jaringan kustom dengan subnet manual di bagian paling bawah
networks:
  neuroflow_net:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.144.0/24