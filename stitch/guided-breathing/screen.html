            "fontFamily": {

<style>
        .breathing-circle {
            transition: transform 4s ease-in-out;
        }
        .inhale {
            transform: scale(1.4);
        }
        .exhale {
            transform: scale(1);
        }
        .glow-teal {
            box-shadow: 0 0 60px rgba(98, 250, 227, 0.3);
        }
        @keyframes pulse-heart {
            0% { transform: scale(1); }
            15% { transform: scale(1.1); }
            30% { transform: scale(1); }
        }
        .animate-pulse-heart {
            animation: pulse-heart 1s infinite;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md overflow-hidden h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-surface dark:bg-surface-container-high shadow-sm w-full top-0 flex justify-between items-center px-gutter py-4 w-full z-50">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary dark:text-inverse-primary" data-icon="signal_cellular_alt">signal_cellular_alt</span>
<h1 class="font-headline-md text-headline-md-mobile text-primary dark:text-inverse-primary">NeuroFlow</h1>
</div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-on-surface-variant hover:opacity-80 active:scale-95 transition-transform" data-icon="watch">watch</span>
</div>
</header>
<!-- Main Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-gutter relative">
<!-- Live Heart Rate Display (Top Right) -->
<div class="absolute top-8 right-8 bg-surface-container-lowest rounded-xl p-6 shadow-lg border border-outline-variant flex flex-col items-center">
<div class="flex items-center gap-2 mb-1">
<span class="material-symbols-outlined text-error animate-pulse-heart" data-icon="favorite" style="font-variation-settings: 'FILL' 1;">favorite</span>
<span class="font-label-lg text-label-lg text-on-surface-variant">Detak Jantung</span>
</div>
<div class="flex items-baseline gap-1">
<span class="font-stats-display text-stats-display text-primary" id="bpm-value">72</span>
<span class="font-label-lg text-label-lg text-on-surface-variant">BPM</span>
</div>
<div class="mt-2 text-secondary text-label-lg font-label-lg flex items-center gap-1">
<span class="material-symbols-outlined text-sm" data-icon="trending_down">trending_down</span>
<span>Turun 4%</span>
</div>
</div>
<!-- Timer Display -->
<div class="mb-12 text-center">
<span class="font-stats-display text-stats-display text-primary" id="session-timer">02:45</span>
<p class="font-label-lg text-label-lg text-on-surface-variant mt-2 uppercase tracking-widest">Waktu Tersisa</p>
</div>
<!-- Breathing Circle Container -->
<div class="relative flex items-center justify-center mb-16">
<!-- Outermost soft glow -->
<div class="absolute w-80 h-80 bg-secondary-container opacity-20 rounded-full blur-3xl"></div>
<!-- Mid layer pulse ring -->
<div class="absolute w-72 h-72 border-2 border-secondary-fixed opacity-30 rounded-full transition-all duration-[4000ms]" id="breath-ring"></div>
<!-- Central Visual Element -->
<div class="breathing-circle w-56 h-56 bg-secondary-container rounded-full flex flex-col items-center justify-center glow-teal z-10" id="central-circle">
<span class="font-headline-md text-headline-md text-on-secondary-container transition-opacity duration-500" id="breath-instruction">Tarik Napas</span>
<div class="mt-2 flex gap-1">
<div class="w-1.5 h-1.5 rounded-full bg-on-secondary-container opacity-40"></div>
<div class="w-1.5 h-1.5 rounded-full bg-on-secondary-container opacity-100"></div>
<div class="w-1.5 h-1.5 rounded-full bg-on-secondary-container opacity-40"></div>
</div>
</div>
</div>
<!-- Instruction Text -->
<div class="max-w-xs text-center">
<h2 class="font-headline-md text-headline-md text-primary mb-2" id="sub-instruction">Ikuti irama lingkaran</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Fokus pada pernapasan perut Anda untuk menenangkan sistem saraf.</p>
</div>
<!-- Controls -->
<div class="mt-16 w-full max-w-sm flex flex-col gap-4">
<button class="w-full bg-primary text-on-primary py-4 px-8 rounded-xl font-headline-md text-headline-md hover:opacity-90 active:scale-95 transition-all shadow-lg flex items-center justify-center gap-2">
<span>Selesai</span>
</button>
<button class="w-full border-2 border-secondary text-secondary py-4 px-8 rounded-xl font-label-lg text-label-lg hover:bg-secondary-container/10 active:scale-95 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined" data-icon="pause">pause</span>
<span>Jeda Sesi</span>
</button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="bg-surface dark:bg-surface-container shadow-[0_-4px_12px_rgba(0,0,0,0.05)] fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-4 pt-2">
<a class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-2 min-h-touch-target-min hover:bg-surface-container-high active:scale-90 transition-all duration-200" href="#">

<span class="font-label-lg text-label-lg">Dash</span>
</a>
<a class="flex flex-col items-center justify-center bg-secondary-container text-on-secondary-container rounded-xl px-4 py-2 min-h-touch-target-min active:scale-90 transition-all duration-200" href="#">
<span class="material-symbols-outlined" data-icon="air" style="font-variation-settings: 'FILL' 1;">air</span>
<span class="font-label-lg text-label-lg">Breathe</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-2 min-h-touch-target-min hover:bg-surface-container-high active:scale-90 transition-all duration-200" href="#">
<span class="material-symbols-outlined" data-icon="query_stats">query_stats</span>
<span class="font-label-lg text-label-lg">Reports</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-2 min-h-touch-target-min hover:bg-surface-container-high active:scale-90 transition-all duration-200" href="#">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="font-label-lg text-label-lg">Settings</span>
</a>
</nav>
<script>
        // Breathing Animation Logic
        const circle = document.getElementById('central-circle');
        const instruction = document.getElementById('breath-instruction');
        const ring = document.getElementById('breath-ring');
        let isInhaling = true;

        function runBreathingCycle() {
            if (isInhaling) {
                circle.classList.add('inhale');
                circle.classList.remove('exhale');
                ring.style.transform = 'scale(1.5)';
                ring.style.opacity = '0.5';
                instruction.innerText = 'Tarik Napas';
            } else {
                circle.classList.add('exhale');
                circle.classList.remove('inhale');
                ring.style.transform = 'scale(1)';
                ring.style.opacity = '0.2';
                instruction.innerText = 'Hembuskan';
            }
            isInhaling = !isInhaling;
        }

        // Start cycle
        setInterval(runBreathingCycle, 4000);
        runBreathingCycle();

        // Heart Rate Randomization for demo
        const bpmElement = document.getElementById('bpm-value');
        setInterval(() => {
            let currentBpm = parseInt(bpmElement.innerText);
            // Slight downward trend simulation
            const drift = Math.random() > 0.6 ? -1 : 1;
            bpmElement.innerText = Math.max(60, Math.min(100, currentBpm + drift));
        }, 3000);

        // Simple Timer Logic
        let totalSeconds = 165; // 2:45
        const timerElement = document.getElementById('session-timer');
        
        setInterval(() => {
            if (totalSeconds > 0) {
                totalSeconds--;
                let mins = Math.floor(totalSeconds / 60);
                let secs = totalSeconds % 60;
                timerElement.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }
        }, 1000);
    </script>
</body></html>
